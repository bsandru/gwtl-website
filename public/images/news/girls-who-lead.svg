<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <!-- Warm gradient background -->
    <linearGradient id="bgGradGWL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>

    <!-- Teal to coral gradient -->
    <linearGradient id="accentGradGWL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A3A3"/>
      <stop offset="50%" style="stop-color:#2DD4BF"/>
      <stop offset="100%" style="stop-color:#ff6b9d"/>
    </linearGradient>

    <!-- Pink accent -->
    <linearGradient id="pinkGradGWL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="100%" style="stop-color:#c44569"/>
    </linearGradient>

    <!-- Star glow -->
    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow -->
    <filter id="softGlowGWL" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradGWL)"/>

  <!-- Ambient orbs -->
  <circle cx="200" cy="150" r="200" fill="#00A3A3" opacity="0.1" filter="url(#softGlowGWL)"/>
  <circle cx="1000" cy="500" r="180" fill="#ff6b9d" opacity="0.08" filter="url(#softGlowGWL)"/>
  <circle cx="600" cy="350" r="250" fill="#2DD4BF" opacity="0.05" filter="url(#softGlowGWL)"/>

  <!-- Decorative stars -->
  <g filter="url(#starGlow)">
    <polygon points="150,100 153,110 163,110 155,117 158,127 150,121 142,127 145,117 137,110 147,110" fill="#2DD4BF" opacity="0.8"/>
    <polygon points="1050,150 1052,157 1059,157 1053,162 1055,169 1050,165 1045,169 1047,162 1041,157 1048,157" fill="#ff6b9d" opacity="0.7"/>
    <polygon points="950,80 952,87 959,87 953,92 955,99 950,95 945,99 947,92 941,87 948,87" fill="#00A3A3" opacity="0.6"/>
    <polygon points="250,500 252,507 259,507 253,512 255,519 250,515 245,519 247,512 241,507 248,507" fill="#2DD4BF" opacity="0.5"/>
    <polygon points="100,350 102,357 109,357 103,362 105,369 100,365 95,369 97,362 91,357 98,357" fill="#ff6b9d" opacity="0.6"/>
  </g>

  <!-- Floating geometric shapes -->
  <g opacity="0.15">
    <rect x="80" y="200" width="60" height="60" rx="10" fill="none" stroke="url(#accentGradGWL)" stroke-width="2" transform="rotate(15 110 230)"/>
    <circle cx="1100" cy="300" r="40" fill="none" stroke="url(#pinkGradGWL)" stroke-width="2"/>
    <polygon points="1050,550 1080,600 1020,600" fill="none" stroke="#2DD4BF" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Rising arrow/growth symbol -->
  <g transform="translate(600, 380)" opacity="0.2">
    <path d="M-100 50 L0 -50 L100 50" fill="none" stroke="url(#accentGradGWL)" stroke-width="4" stroke-linecap="round"/>
    <path d="M-70 80 L0 -20 L70 80" fill="none" stroke="url(#accentGradGWL)" stroke-width="3" stroke-linecap="round"/>
    <path d="M-40 110 L0 10 L40 110" fill="none" stroke="url(#accentGradGWL)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Abstract person silhouettes -->
  <g transform="translate(350, 450)" opacity="0.3">
    <ellipse cx="0" cy="-60" rx="20" ry="25" fill="url(#accentGradGWL)"/>
    <path d="M-30 0 Q0 -40 30 0 L20 80 L-20 80 Z" fill="url(#accentGradGWL)"/>
  </g>
  <g transform="translate(600, 420)" opacity="0.4">
    <ellipse cx="0" cy="-70" rx="25" ry="30" fill="url(#pinkGradGWL)"/>
    <path d="M-35 0 Q0 -50 35 0 L25 100 L-25 100 Z" fill="url(#pinkGradGWL)"/>
  </g>
  <g transform="translate(850, 450)" opacity="0.3">
    <ellipse cx="0" cy="-60" rx="20" ry="25" fill="#2DD4BF"/>
    <path d="M-30 0 Q0 -40 30 0 L20 80 L-20 80 Z" fill="#2DD4BF"/>
  </g>

  <!-- Main title -->
  <text x="600" y="200" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle">Girls Who</text>
  <text x="600" y="290" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="url(#accentGradGWL)" text-anchor="middle">Lead</text>

  <!-- Subtitle -->
  <text x="600" y="340" font-family="system-ui, sans-serif" font-size="20" fill="white" text-anchor="middle" opacity="0.7" letter-spacing="4">ERASMUS+ INITIATIVE</text>

  <!-- Badge -->
  <g transform="translate(600, 600)">
    <rect x="-80" y="-20" width="160" height="40" rx="20" fill="url(#pinkGradGWL)" opacity="0.9"/>
    <text x="0" y="7" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">2024 - 2026</text>
  </g>

  <!-- GWTL mark -->
  <g transform="translate(80, 60)">
    <circle cx="25" cy="25" r="25" fill="url(#accentGradGWL)" opacity="0.9"/>
    <text x="25" y="33" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e" text-anchor="middle">G</text>
  </g>
</svg>