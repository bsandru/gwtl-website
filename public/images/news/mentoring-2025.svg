<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <!-- Warm gradient background -->
    <linearGradient id="bgGradMentor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1629"/>
      <stop offset="40%" style="stop-color:#1a2744"/>
      <stop offset="100%" style="stop-color:#0f1629"/>
    </linearGradient>

    <!-- Teal gradient -->
    <linearGradient id="tealGradMentor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A3A3"/>
      <stop offset="100%" style="stop-color:#2DD4BF"/>
    </linearGradient>

    <!-- Orange/coral accent -->
    <linearGradient id="coralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>

    <!-- Connection line gradient -->
    <linearGradient id="connectionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A3A3"/>
      <stop offset="50%" style="stop-color:#2DD4BF"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glowMentor" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft particle -->
    <filter id="particleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradMentor)"/>

  <!-- Ambient glows -->
  <circle cx="350" cy="350" r="250" fill="#00A3A3" opacity="0.1" filter="url(#glowMentor)"/>
  <circle cx="850" cy="350" r="250" fill="#f97316" opacity="0.08" filter="url(#glowMentor)"/>

  <!-- Connection network in background -->
  <g opacity="0.15">
    <!-- Nodes -->
    <circle cx="200" cy="200" r="8" fill="url(#tealGradMentor)"/>
    <circle cx="350" cy="150" r="6" fill="url(#tealGradMentor)"/>
    <circle cx="500" cy="180" r="10" fill="url(#tealGradMentor)"/>
    <circle cx="700" cy="120" r="7" fill="url(#coralGrad)"/>
    <circle cx="850" cy="200" r="9" fill="url(#coralGrad)"/>
    <circle cx="1000" cy="150" r="6" fill="url(#coralGrad)"/>

    <circle cx="150" cy="500" r="7" fill="url(#tealGradMentor)"/>
    <circle cx="300" cy="550" r="8" fill="url(#tealGradMentor)"/>
    <circle cx="500" cy="520" r="6" fill="url(#tealGradMentor)"/>
    <circle cx="700" cy="550" r="9" fill="url(#coralGrad)"/>
    <circle cx="900" cy="500" r="7" fill="url(#coralGrad)"/>
    <circle cx="1050" cy="530" r="8" fill="url(#coralGrad)"/>

    <!-- Connecting lines -->
    <line x1="200" y1="200" x2="350" y2="150" stroke="url(#connectionGrad)" stroke-width="1"/>
    <line x1="350" y1="150" x2="500" y2="180" stroke="url(#connectionGrad)" stroke-width="1"/>
    <line x1="500" y1="180" x2="700" y2="120" stroke="url(#connectionGrad)" stroke-width="1"/>
    <line x1="700" y1="120" x2="850" y2="200" stroke="url(#connectionGrad)" stroke-width="1"/>
    <line x1="850" y1="200" x2="1000" y2="150" stroke="url(#connectionGrad)" stroke-width="1"/>
  </g>

  <!-- Main visual: Two connected figures -->
  <g transform="translate(600, 350)">
    <!-- Connection beam -->
    <ellipse cx="0" cy="0" rx="200" ry="40" fill="none" stroke="url(#connectionGrad)" stroke-width="3" stroke-dasharray="10 5" opacity="0.4"/>

    <!-- Mentor figure (left) -->
    <g transform="translate(-150, 0)">
      <circle cx="0" cy="-80" r="45" fill="url(#tealGradMentor)" opacity="0.9"/>
      <path d="M-50 20 Q0 -30 50 20 L35 120 L-35 120 Z" fill="url(#tealGradMentor)" opacity="0.8"/>
      <!-- Glow ring -->
      <circle cx="0" cy="-80" r="55" fill="none" stroke="#2DD4BF" stroke-width="2" opacity="0.3"/>
    </g>

    <!-- Mentee figure (right) -->
    <g transform="translate(150, 0)">
      <circle cx="0" cy="-60" r="38" fill="url(#coralGrad)" opacity="0.9"/>
      <path d="M-40 30 Q0 -15 40 30 L28 110 L-28 110 Z" fill="url(#coralGrad)" opacity="0.8"/>
      <!-- Glow ring -->
      <circle cx="0" cy="-60" r="48" fill="none" stroke="#fb923c" stroke-width="2" opacity="0.3"/>
    </g>

    <!-- Connection arc between them -->
    <path d="M-100 -50 Q0 -120 100 -30" fill="none" stroke="url(#connectionGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

    <!-- Floating particles along connection -->
    <g filter="url(#particleGlow)">
      <circle cx="-60" cy="-75" r="4" fill="#2DD4BF" opacity="0.8"/>
      <circle cx="0" cy="-95" r="5" fill="white" opacity="0.6"/>
      <circle cx="60" cy="-55" r="4" fill="#fb923c" opacity="0.8"/>
    </g>
  </g>

  <!-- Floating elements -->
  <g filter="url(#particleGlow)" opacity="0.6">
    <circle cx="100" cy="300" r="3" fill="#2DD4BF"/>
    <circle cx="180" cy="400" r="4" fill="#00A3A3"/>
    <circle cx="1100" cy="280" r="4" fill="#fb923c"/>
    <circle cx="1020" cy="380" r="3" fill="#f97316"/>
  </g>

  <!-- Main title -->
  <text x="600" y="140" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle">Mentoring</text>
  <text x="600" y="210" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="url(#tealGradMentor)" text-anchor="middle">Program</text>

  <!-- Year badge -->
  <g transform="translate(600, 580)">
    <rect x="-60" y="-22" width="120" height="44" rx="22" fill="url(#tealGradMentor)" opacity="0.9"/>
    <text x="0" y="7" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#0f1629" text-anchor="middle">2025</text>
  </g>

  <!-- Stats highlights -->
  <g transform="translate(200, 600)" opacity="0.7">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle">500+ Mentors</text>
  </g>
  <g transform="translate(1000, 600)" opacity="0.7">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle">40+ Countries</text>
  </g>

  <!-- GWTL mark -->
  <g transform="translate(80, 60)">
    <circle cx="25" cy="25" r="25" fill="url(#tealGradMentor)"/>
    <text x="25" y="33" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#0f1629" text-anchor="middle">G</text>
  </g>
</svg>