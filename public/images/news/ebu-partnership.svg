<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <!-- Sophisticated blue gradient -->
    <linearGradient id="bgGradEBU" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1445"/>
      <stop offset="50%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#0c1445"/>
    </linearGradient>

    <!-- EU blue accent -->
    <linearGradient id="euBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>

    <!-- Teal -->
    <linearGradient id="tealGradEBU" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A3A3"/>
      <stop offset="100%" style="stop-color:#2DD4BF"/>
    </linearGradient>

    <!-- Gold accent -->
    <linearGradient id="goldGradEBU" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glowEBU" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Star glow -->
    <filter id="starGlowEBU" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradEBU)"/>

  <!-- Ambient glows -->
  <circle cx="300" cy="200" r="200" fill="#3b82f6" opacity="0.1" filter="url(#glowEBU)"/>
  <circle cx="900" cy="450" r="180" fill="#00A3A3" opacity="0.1" filter="url(#glowEBU)"/>

  <!-- EU stars circle -->
  <g transform="translate(600, 340)" opacity="0.15">
    <circle cx="0" cy="0" r="200" fill="none" stroke="url(#goldGradEBU)" stroke-width="2"/>
    <!-- 12 EU stars -->
    <g filter="url(#starGlowEBU)">
      <polygon points="0,-180 4,-168 16,-168 6,-160 10,-148 0,-155 -10,-148 -6,-160 -16,-168 -4,-168" fill="#fbbf24" transform="rotate(0)"/>
      <polygon points="0,-180 4,-168 16,-168 6,-160 10,-148 0,-155 -10,-148 -6,-160 -16,-168 -4,-168" fill="#fbbf24" transform="rotate(30)"/>
      <polygon points="0,-180 4,-168 16,-168 6,-160 10,-148 0,-155 -10,-148 -6,-160 -16,-168 -4,-168" fill="#fbbf24" transform="rotate(60)"/>
      <polygon points="0,-180 4,-168 16,-168 6,-160 10,-148 0,-155 -10,-148 -6,-160 -16,-168 -4,-168" fill="#fbbf24" transform="rotate(90)"/>
      <polygon points="0,-180 4,-168 16,-168 6,-160 10,-148 0,-155 -10,-148 -6,-160 -16,-168 -4,-168" fill="#fbbf24" transform="rotate(120)"/>
      <polygon points="0,-180 4,-168 16,-168 6,-160 10,-148 0,-155 -10,-148 -6,-160 -16,-168 -4,-168" fill="#fbbf24" transform="rotate(150)"/>
      <polygon points="0,-180 4,-168 16,-168 6,-160 10,-148 0,-155 -10,-148 -6,-160 -16,-168 -4,-168" fill="#fbbf24" transform="rotate(180)"/>
      <polygon points="0,-180 4,-168 16,-168 6,-160 10,-148 0,-155 -10,-148 -6,-160 -16,-168 -4,-168" fill="#fbbf24" transform="rotate(210)"/>
      <polygon points="0,-180 4,-168 16,-168 6,-160 10,-148 0,-155 -10,-148 -6,-160 -16,-168 -4,-168" fill="#fbbf24" transform="rotate(240)"/>
      <polygon points="0,-180 4,-168 16,-168 6,-160 10,-148 0,-155 -10,-148 -6,-160 -16,-168 -4,-168" fill="#fbbf24" transform="rotate(270)"/>
      <polygon points="0,-180 4,-168 16,-168 6,-160 10,-148 0,-155 -10,-148 -6,-160 -16,-168 -4,-168" fill="#fbbf24" transform="rotate(300)"/>
      <polygon points="0,-180 4,-168 16,-168 6,-160 10,-148 0,-155 -10,-148 -6,-160 -16,-168 -4,-168" fill="#fbbf24" transform="rotate(330)"/>
    </g>
  </g>

  <!-- Partnership handshake/connection symbol -->
  <g transform="translate(600, 380)">
    <!-- Two interlocking circles -->
    <circle cx="-60" cy="0" r="80" fill="none" stroke="url(#tealGradEBU)" stroke-width="4" opacity="0.6"/>
    <circle cx="60" cy="0" r="80" fill="none" stroke="url(#euBlue)" stroke-width="4" opacity="0.6"/>

    <!-- Intersection highlight -->
    <ellipse cx="0" cy="0" rx="30" ry="60" fill="url(#goldGradEBU)" opacity="0.3"/>

    <!-- Center point -->
    <circle cx="0" cy="0" r="15" fill="url(#goldGradEBU)" opacity="0.9"/>
  </g>

  <!-- Organization logos representation -->
  <g transform="translate(350, 380)">
    <rect x="-50" y="-30" width="100" height="60" rx="10" fill="url(#tealGradEBU)" opacity="0.3"/>
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">GWTL</text>
  </g>
  <g transform="translate(850, 380)">
    <rect x="-50" y="-30" width="100" height="60" rx="10" fill="url(#euBlue)" opacity="0.3"/>
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">EBU</text>
  </g>

  <!-- Connecting arrow -->
  <g opacity="0.5">
    <line x1="420" y1="380" x2="530" y2="380" stroke="url(#tealGradEBU)" stroke-width="2" stroke-dasharray="8 4"/>
    <line x1="670" y1="380" x2="780" y2="380" stroke="url(#euBlue)" stroke-width="2" stroke-dasharray="8 4"/>
  </g>

  <!-- Decorative lines -->
  <line x1="100" y1="150" x2="350" y2="150" stroke="url(#goldGradEBU)" stroke-width="2" opacity="0.3"/>
  <line x1="850" y1="150" x2="1100" y2="150" stroke="url(#goldGradEBU)" stroke-width="2" opacity="0.3"/>

  <!-- Main title -->
  <text x="600" y="120" font-family="Georgia, serif" font-size="32" fill="#fbbf24" text-anchor="middle" letter-spacing="4" opacity="0.9">STRATEGIC PARTNERSHIP</text>

  <text x="600" y="220" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle">European Business</text>
  <text x="600" y="290" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="url(#tealGradEBU)" text-anchor="middle">University</text>

  <!-- Location badge -->
  <g transform="translate(600, 560)">
    <rect x="-80" y="-20" width="160" height="40" rx="20" fill="url(#euBlue)" opacity="0.3" stroke="url(#euBlue)" stroke-width="1"/>
    <text x="0" y="6" font-family="system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle" letter-spacing="2">LUXEMBOURG</text>
  </g>

  <!-- Year -->
  <g transform="translate(600, 620)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="16" fill="white" text-anchor="middle" opacity="0.6">2025</text>
  </g>

  <!-- Decorative corner elements -->
  <g opacity="0.2">
    <path d="M50 50 L50 100 L100 100" fill="none" stroke="url(#goldGradEBU)" stroke-width="2"/>
    <path d="M1150 50 L1150 100 L1100 100" fill="none" stroke="url(#goldGradEBU)" stroke-width="2"/>
    <path d="M50 625 L50 575 L100 575" fill="none" stroke="url(#goldGradEBU)" stroke-width="2"/>
    <path d="M1150 625 L1150 575 L1100 575" fill="none" stroke="url(#goldGradEBU)" stroke-width="2"/>
  </g>

  <!-- GWTL mark -->
  <g transform="translate(80, 60)">
    <circle cx="25" cy="25" r="25" fill="url(#tealGradEBU)"/>
    <text x="25" y="33" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#0c1445" text-anchor="middle">G</text>
  </g>
</svg>